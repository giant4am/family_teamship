<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 가족도 팀일까? — 가족 팀십 인식 진단</title>
<style>
  :root{
    --bg1:#fdf2f6; --bg2:#fbe7ee;
    --rose:#d65a83; --rose-deep:#b8456a; --rose-soft:#fbe4ec; --rose-line:#f3cdda;
    --ink:#473038; --muted:#9a7e8a; --cream:#fffafc;
    --good:#5db98a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink); line-height:1.6; min-height:100vh; padding:0 0 60px;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 18px;}

  /* Progress */
  .progress-bar{position:sticky;top:0;z-index:50;background:rgba(253,242,246,.92);backdrop-filter:blur(8px);padding:14px 18px 10px;}
  .progress-bar .track{max-width:644px;margin:0 auto;height:8px;background:var(--rose-soft);border-radius:99px;overflow:hidden;}
  .progress-bar .fill{height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--rose-deep));border-radius:99px;transition:width .4s ease;}
  .progress-bar .label{max-width:644px;margin:6px auto 0;font-size:12px;color:var(--muted);text-align:right;font-weight:600;}

  .card{background:var(--cream);border:1px solid var(--rose-line);border-radius:22px;padding:26px 22px;margin-top:18px;box-shadow:0 10px 30px -18px rgba(184,69,106,.4);}

  /* Intro */
  .hero{text-align:center;padding-top:36px;}
  .hero .emoji{font-size:46px;}
  .hero h1{font-size:26px;font-weight:800;margin:10px 0 6px;letter-spacing:-.5px;color:var(--rose-deep);}
  .hero .sub{color:var(--muted);font-size:15px;font-weight:600;}
  .guide{background:var(--rose-soft);border-radius:16px;padding:18px 18px;margin-top:22px;font-size:14.5px;}
  .guide b{color:var(--rose-deep);}
  .scale-legend{display:flex;justify-content:space-between;gap:6px;margin-top:16px;}
  .scale-legend div{flex:1;text-align:center;background:#fff;border:1px solid var(--rose-line);border-radius:12px;padding:9px 4px;font-size:11.5px;color:var(--muted);font-weight:600;}
  .scale-legend div b{display:block;font-size:16px;color:var(--rose);margin-bottom:2px;}

  /* Step header */
  .step-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px;}
  .step-badge{flex:none;width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,var(--rose),var(--rose-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;box-shadow:0 6px 14px -6px var(--rose-deep);}
  .step-head h2{font-size:19px;font-weight:800;letter-spacing:-.4px;}
  .step-head .ssub{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:1px;}

  .mini-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:18px 2px 2px;font-weight:600;}

  /* Question */
  .q{border-top:1px dashed var(--rose-line);padding-top:20px;margin-top:20px;}
  .q:first-of-type{border-top:none;padding-top:6px;margin-top:14px;}
  .q .qnum{display:inline-block;background:var(--rose-soft);color:var(--rose-deep);font-weight:800;font-size:12px;padding:3px 10px;border-radius:99px;margin-bottom:8px;}
  .q .qtext{font-size:15.5px;font-weight:700;letter-spacing:-.2px;}
  .ex{background:#fff;border:1px solid var(--rose-line);border-radius:12px;padding:11px 13px;margin-top:10px;font-size:12.8px;color:#7d6470;line-height:1.55;}
  .ex .extag{display:inline-block;font-weight:800;color:var(--rose);font-size:11px;margin-right:6px;}

  .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px;}
  .scale button{border:1.5px solid var(--rose-line);background:#fff;border-radius:14px;padding:12px 0 9px;cursor:pointer;font-size:18px;font-weight:800;color:var(--rose);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .scale button .t{font-size:10px;font-weight:600;color:var(--muted);}
  .scale button:hover{border-color:var(--rose);transform:translateY(-2px);}
  .scale button.sel{background:linear-gradient(145deg,var(--rose),var(--rose-deep));border-color:var(--rose-deep);color:#fff;box-shadow:0 8px 16px -8px var(--rose-deep);}
  .scale button.sel .t{color:#ffe3ee;}

  textarea{width:100%;border:1.5px solid var(--rose-line);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:14.5px;color:var(--ink);resize:vertical;min-height:84px;margin-top:12px;background:#fff;}
  textarea:focus{outline:none;border-color:var(--rose);}
  .open-tag{display:inline-block;background:#fdeef4;color:var(--rose-deep);font-weight:800;font-size:11px;padding:3px 10px;border-radius:99px;margin-bottom:8px;}

  /* Topics */
  .topic{display:flex;align-items:center;gap:12px;border:1.5px solid var(--rose-line);background:#fff;border-radius:14px;padding:14px 15px;margin-top:10px;cursor:pointer;transition:.15s;font-weight:700;font-size:14.5px;}
  .topic:hover{border-color:var(--rose);}
  .topic.sel{background:var(--rose-soft);border-color:var(--rose);}
  .topic .chk{flex:none;width:22px;height:22px;border-radius:7px;border:2px solid var(--rose-line);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:.15s;}
  .topic.sel .chk{background:var(--rose);border-color:var(--rose);}

  /* Nav */
  .nav{display:flex;gap:10px;margin-top:24px;}
  .btn{flex:1;border:none;border-radius:16px;padding:15px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn-primary{background:linear-gradient(145deg,var(--rose),var(--rose-deep));color:#fff;box-shadow:0 10px 22px -10px var(--rose-deep);}
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-ghost{flex:none;background:#fff;border:1.5px solid var(--rose-line);color:var(--rose-deep);padding:15px 20px;}
  .btn-ghost:hover{border-color:var(--rose);}

  /* Results */
  .res-hero{text-align:center;}
  .res-band{display:inline-block;background:linear-gradient(145deg,var(--rose),var(--rose-deep));color:#fff;font-weight:800;font-size:14px;padding:8px 18px;border-radius:99px;margin-bottom:10px;}
  .res-score{font-size:54px;font-weight:800;color:var(--rose-deep);line-height:1;letter-spacing:-1px;}
  .res-score small{font-size:20px;color:var(--muted);font-weight:700;}
  .res-msg{color:#6e5560;font-size:14.5px;margin-top:12px;}
  .sec-row{margin-top:16px;}
  .sec-row .top{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:5px;}
  .sec-row .top span:last-child{color:var(--rose-deep);font-weight:800;}
  .sec-track{height:10px;background:var(--rose-soft);border-radius:99px;overflow:hidden;}
  .sec-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose-deep));border-radius:99px;}
  .pill-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .pill{background:var(--rose-soft);color:var(--rose-deep);font-weight:700;font-size:13px;padding:7px 13px;border-radius:99px;}
  .pill.good{background:#e3f5ec;color:#3f9670;}
  .res-sub{font-size:16px;font-weight:800;margin:24px 0 4px;color:var(--rose-deep);display:flex;align-items:center;gap:8px;}
  .open-review{background:#fff;border:1px solid var(--rose-line);border-radius:12px;padding:12px 14px;margin-top:10px;}
  .open-review .oq{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .open-review .oa{font-size:14px;white-space:pre-wrap;}
  .closing{text-align:center;background:var(--rose-soft);border-radius:16px;padding:20px;margin-top:24px;font-size:14px;font-weight:600;color:#6e5560;line-height:1.7;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:99px;font-size:13.5px;font-weight:700;opacity:0;transition:.3s;z-index:99;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media print{
    body{background:#fff;}
    .progress-bar,.nav,.no-print{display:none !important;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
  }
</style>
</head>
<body>
  <div class="progress-bar" id="progress" style="display:none;">
    <div class="track"><div class="fill" id="pfill"></div></div>
    <div class="label" id="plabel"></div>
  </div>
  <div class="wrap">
    <div id="screen"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* ===== 설문 데이터 (원본 그대로) ===== */
const STEPS = [
  {
    n:1, title:"팀십 인식 깨우기", sub:"가족도 하나의 팀일까요?",
    scale:[
      {id:"q1", text:'나는 가족을 "팀"이라고 생각해본 적이 있다.',
       ex:'이사할 때 다 같이 짐을 나르거나, 아이 학교 문제를 함께 의논하거나, 경제적으로 힘들 때 서로 역할을 조정한 경험. 회사 팀처럼 가족도 서로 영향을 주고받으며 함께 결과를 만들어간다는 느낌.'},
      {id:"q2", text:'가족 중 한 사람의 기분이나 상태가 우리 집 전체 분위기에 영향을 준다고 느낀다.',
       ex:'남편이 직장에서 스트레스받은 날 저녁 식탁이 조용해지거나, 내가 지쳐있으면 아이들도 눈치를 보는 상황. 한 사람의 에너지가 온 집안에 퍼지는 경험.'},
      {id:"q3", text:'우리 가족도 "가족팀으로서 어떻게 함께 구체적인 행동으로 실천할 것인가?"에 대한 방식이나 약속이 있으면 좋겠다고 느낀다.',
       ex:'싸운 뒤 어떻게 화해할지, 힘들 때 어떻게 도울지, 중요한 결정을 어떻게 함께 할지, 배우자나 자녀의 행동변화를 위해 어떻게 도울 수 있나 등. 그냥 사랑하니까 괜찮겠지 싶었는데, 막상 어떻게 해야 할지 몰랐던 경험.'}
    ],
    open:[{id:"o1", text:'우리 가족이 팀처럼 느껴졌던 순간이 있다면 적어주세요.',
      ex:'이사할 때 다 함께 역할을 나눴을 때, 아이가 아팠을 때, 자연스럽게 서로 도왔을 때…'}]
  },
  {
    n:2, title:"심리적 안전감", sub:"우리 집은 마음을 말해도 안전한 곳인가요?",
    scale:[
      {id:"q4", text:'나는 가족 앞에서 실수나 약점을 이야기해도 비난받지 않을 것이라는 믿음이 있다.',
       ex:'"나 오늘 너무 힘들었어." "나 사실 그 말에 상처받았어." "나도 잘 못하겠어." 이런 말을 했을 때 핀잔이나 훈계보다 먼저 들어주는 분위기가 우리 집에 있다.'},
      {id:"q5", text:'가족 중 누군가 힘들다고 말하면, 바로 해결책을 주기보다 먼저 들어주는 편이다.',
       ex:'아이가 "학교 가기 싫어"라고 했을 때 "그런 소리 하지 마"보다 "무슨 일이 있었어? 많이 힘들었구나"라고 반응한다. 남편이 회사 얘기를 꺼낼 때 판단하기 전에 끝까지 듣는다.'},
      {id:"q6", text:'우리 가족은 서로에게 감정을 드러내도 괜찮은 분위기다. (배우자나 자녀가 자신의 힘든 감정을 말한다.)',
       ex:'눈물, 짜증, 불안, 서운함을 표현했을 때 "왜 그렇게 예민해?"보다 그 감정 뒤에 있는 마음을 보려고 한다. 나도 지쳤다고 말할 수 있다.'}
    ],
    open:[{id:"o2", text:'우리 집에서 마음을 말하기 어려운 이유가 있다면?',
      ex:'상대가 해결책으로만 반응해서, 판단받을 것 같아서, 분위기가 어색해져서…'}]
  },
  {
    n:3, title:"존재로 바라보기", sub:"역할이 아닌 한 사람으로 보고 있나요?",
    scale:[
      {id:"q7", text:'우리 가족은 서로를 역할(엄마·아빠·자녀)로만 보지 않으려고 한다.',
       ex:'엄마를 "밥 차려주는 사람"으로만 보지 않고, 쉬고 싶고 인정받고 싶은 한 사람으로 본다. 자녀를 "공부해야 하는 사람"이 아닌, 자기만의 감정과 욕구가 있는 존재로 바라본다.'},
      {id:"q8", text:'우리 가족은 "무엇을 해냈는가"보다 "요즘 어떤 상태인가"를 묻는 시간이 있다.',
       ex:'"숙제했어?" "돈 벌었어?"만 묻는 게 아니라 "요즘 마음은 어때?" "오늘 에너지 몇 점이야?" "뭐가 필요해?"를 묻는 대화가 가끔이라도 있다.'},
      {id:"q9", text:'나는 가족들이 요즘 무엇 때문에 힘든지, 어떤 걸 꿈꾸는지 알고 있다.',
       ex:'남편이 요즘 무슨 고민을 하는지, 아이가 진짜 좋아하는 게 무엇인지, 내 꿈과 고민을 가족이 알고 있는지. 같은 집에 살지만 서로의 속마음은 모르는 경우도 많다.'}
    ],
    open:[{id:"o3", text:'가족들이 꼭 알아줬으면 하는 나의 한 가지는?',
      ex:'나도 가끔은 쉬고 싶다는 것, 내가 지금 새로운 도전을 꿈꾸고 있다는 것…'}]
  },
  {
    n:4, title:"역할과 상호 기여", sub:"희생하는 사람만 있지는 않은가요?",
    scale:[
      {id:"q10", text:'우리 가족은 집안일·돌봄·감정 노동이 한 사람에게만 집중되지 않는다.',
       ex:'식사 준비, 청소, 가족 일정 관리, 부모님 챙기기, 아이 학교 연락, 가족 분위기 살피기를 늘 나 혼자 기억하고 책임지지 않아도 된다. 보이지 않는 노동을 가족이 알아차려준다.'},
      {id:"q11", text:'우리 가족은 "누가 뭘 해야 해?"를 넘어 "서로 어떻게 도울 수 있을까?"를 의논한다.',
       ex:'내가 지친 날 자녀가 자연스럽게 설거지를 돕거나, 아이 시험기간엔 가족이 조용한 환경을 만들어주거나, 남편이 바쁜 주엔 내가 더 맡고 그 반대도 된다. 의무가 아닌 배려로 움직이는 팀.'},
      {id:"q12", text:'우리 가족은 각자의 개인 목표와 성장을 응원하는 분위기가 있다.',
       ex:'공부, 운동, 취미, 새로운 도전을 "쓸데없는 일"이 아니라 가족의 자랑으로 응원해준다. 엄마의 성장이 곧 가족의 성장이라는 인식이 있다.'}
    ],
    open:[{id:"o4", text:'지금 내가 가족에게 받고 싶은 도움이 있다면?',
      ex:'내가 공부할 시간, 가끔 혼자만의 시간, 내 말을 끝까지 들어주는 것…'}]
  },
  {
    n:5, title:"소통과 갈등 회복", sub:"싸우지 않는 가족인가요, 회복하는 가족인가요?",
    scale:[
      {id:"q13", text:'우리 가족은 불편한 이야기를 너무 오래 묻어두지 않고 말하려고 한다.',

      {id:"q14", text:'갈등이 생겼을 때 "누가 맞는지"보다 "관계를 회복하는 것"을 더 중요하게 여긴다.',

    ],
    open:[{id:"o5", text:'우리 가족에서 자주 묻어두는 이야기가 있다면?',

  },
  {
    n:6, title:"인정과 응원", sub:"서로의 기여를 알아봐 주고 있나요?",
    scale:[

      {id:"q17", text:'우리 가족은 누군가의 작은 성장도 함께 기뻐하는 분위기다.',

    ],
    open:[{id:"o6", text:'최근 가족에게 듣고 싶었던 말이 있다면?',
      ex:'수고했어. 네 덕분이야. 엄마가 요즘 정말 멋있어 보여. 고마워.'}]
  },
  {
    n:7, title:"공동 목표와 가족 문화", sub:"우리 가족은 어디를 향해 가고 있나요?",
    scale:[
      {id:"q18", text:'우리 가족이 함께 중요하게 여기는 가치가 있다.',
       ex:'건강, 대화, 정직, 배움, 경제적 안정, 여행, 가족 식사처럼 "우리 가족은 이것을 중요하게 여긴다"는 방향이 있다. 거창하지 않아도 괜찮다. 우리 집에서 당연히 지키는 것들.'},
      {id:"q19", text:'중요한 결정을 할 때 한 사람의 뜻만으로 정하지 않기 위한 가족회의를 한다.',
       ex:'이사, 진로, 큰 지출, 부모님 돌봄, 경제적 위기 상황 - 통보하지 않고 함께 의논한다. "우리"의 결정이 된다. 내 의견이 반영되었다는 느낌이 있다.'},
      {id:"q20", text:'우리 가족만의 반복되는 좋은 습관이나 리추얼이 있다.',
       ex:'주말 아침 같이 먹기, 잠들기 전 짧은 대화, 생일 편지, 한 달에 한 번 외식, 명절마다 사진 찍기, 감사한 것 말하기, 분기별 문화행사 관람 - 작더라도 우리 가족만의 반복되는 문화.'}
    ],
    open:[{id:"o7", text:'우리 가족에게 만들고 싶은 새로운 리추얼은?',
      ex:'일주일에 한 번 다 같이 저녁 먹기, 잠들기 전 하루 한 가지 감사 말하기…'}]
  },
  {
    n:8, title:"팀십 준비도", sub:"우리 가족, 더 좋은 팀이 될 수 있을까요?",
    scale:[
      {id:"q21", text:'나는 우리 가족이 지금보다 더 좋은 팀이 될 수 있다고 믿는다.',
       ex:'지금 완벽하지 않아도, 대화 방식·역할 나눔·회복 방법을 조금씩 바꾸면 더 따뜻하고 단단한 가족이 될 수 있다. 가족팀십은 저절로 되는 게 아니라 함께 배워가는 것이다.'}
    ],
    open:[
      {id:"o8", text:'우리 가족이 팀이 아니라고 느꼈던 순간을 적어주세요.',
        ex:'아플 때 나만 집안일을 하고 있었을 때 / 중요한 결정을 나만 빼고 했을 때 / 힘들다고 했더니 "왜 그걸 못 참아?"라는 말을 들었을 때 / 내 성장은 가족한테 중요하지 않다고 느꼈을 때 / "혼자만 애쓰고 있다"라는 생각이 들었을 때'},
      {id:"o9", text:'좋은 가족팀이 되기 위해 우리 가족에게 가장 필요한 것은?',
        ex:'대화 시간 / 서로의 감정 표현 / 역할 나눔 / 감사 표현 / 갈등 후 사과하는 법 / 가족회의 / 경제 의논 / 함께 웃는 시간 / 공동 목표'}
    ]
  }
];

const TOPICS = [
  "심리적 안전감 만들기",
  "(비폭력대화로) 가족과 소통하기",
  "가족회의 하는 법",
  "가사와 돌봄 분담하기",
  "부부 팀십 강화",
  "사춘기 자녀와의 팀십",
  "가족 갈등 회복법",
  "가족 리추얼 만들기",
  "서로를 응원하는 문화 만들기 (성적·진로·진급)"
];

const SCALE_LABELS = ["전혀 그렇지 않다","그렇지 않은 편이다","보통이다","그런 편이다","매우 그렇다"];

/* ===== 응답 수집 설정 =====
   아래 따옴표 안에 본인의 Google Apps Script 웹앱 URL을 붙여넣으세요.
   (URL을 넣지 않으면 화면에서 결과만 보이고, 시트에는 저장되지 않습니다.) */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx6PINmWVup17AnW9Q3MHmlUFKNj8SQAidP74r-nndHPbXBxeurtxbY-icOHPLPETVtUA/exec";

/* ===== 상태 ===== */
const state = { idx:0, name:'', answers:{}, opens:{}, topics:new Set(), submitted:false };
// flow: 0 = intro, 1..8 = STEPS[0..7], 9 = topics, 10 = result
const TOTAL_INPUT = STEPS.length + 1; // 8 steps + topics

const screen = document.getElementById('screen');
const prog = document.getElementById('progress');

function setProgress(){
  if(state.idx===0 || state.idx>STEPS.length+1){ prog.style.display='none'; return; }
  prog.style.display='block';
  const cur = state.idx; // 1..9
  document.getElementById('pfill').style.width = (cur/TOTAL_INPUT*100)+'%';
  document.getElementById('plabel').textContent = `${cur} / ${TOTAL_INPUT}`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  setProgress();
  window.scrollTo({top:0,behavior:'smooth'});
  if(state.idx===0) return renderIntro();
  if(state.idx>=1 && state.idx<=STEPS.length) return renderStep(STEPS[state.idx-1]);
  if(state.idx===STEPS.length+1) return renderTopics();
  return renderResult();
}

function renderIntro(){
  screen.innerHTML = `
    <div class="hero">
      <div class="emoji">🌷</div>
      <h1>우리 가족도 팀일까?</h1>
      <div class="sub">가족 팀십 인식 진단</div>
    </div>
    <div class="card">
      <div class="guide">
        <b>정답은 없습니다.</b> 지금 우리 가족의 모습을 솔직하게 떠올리며 답해주세요.
        이 진단은 <b>"우리 가족에게 무엇이 필요할까?"</b>를 함께 생각해보는 계기가 됩니다.
      </div>
      <div style="font-size:13px;color:var(--muted);font-weight:700;margin-top:18px;">응답 기준</div>
      <div class="scale-legend">
        <div><b>1</b>전혀<br>그렇지 않다</div>
        <div><b>2</b>그렇지<br>않은 편</div>
        <div><b>3</b>보통<br>이다</div>
        <div><b>4</b>그런<br>편이다</div>
        <div><b>5</b>매우<br>그렇다</div>
      </div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:16px;text-align:center;">
        총 8단계 · 21개 척도 문항 + 9개 서술 문항 · 약 7분 소요
      </div>
      <div class="nav">
        <button class="btn btn-primary" onclick="next()">진단 시작하기</button>
      </div>
    </div>`;
}

function renderStep(s){
  let qhtml = s.scale.map(q=>{
    const sel = state.answers[q.id];
    const btns = SCALE_LABELS.map((lab,i)=>{
      const v=i+1;
      return `<button class="${sel===v?'sel':''}" onclick="pick('${q.id}',${v})">
        ${v}<span class="t">${['전혀 아니다','아닌 편','보통','그런 편','매우'][i]}</span></button>`;
    }).join('');
    return `<div class="q">
      <span class="qnum">${q.id.toUpperCase()}</span>
      <div class="qtext">${esc(q.text)}</div>
      <div class="ex"><span class="extag">예시</span>${esc(q.ex)}</div>
      <div class="scale">${btns}</div>
    </div>`;
  }).join('');

  let ohtml = s.open.map(o=>{
    const val = state.opens[o.id]||'';
    return `<div class="q">
      <span class="open-tag">✍️ 서술형</span>
      <div class="qtext">${esc(o.text)}</div>
      <div class="ex"><span class="extag">예시</span>${esc(o.ex)}</div>
      <textarea oninput="setOpen('${o.id}',this.value)" placeholder="자유롭게 적어주세요 (선택)">${esc(val)}</textarea>
    </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="card">
      <div class="step-head">
        <div class="step-badge">${s.n}</div>
        <div>
          <h2>${esc(s.title)}</h2>
          <div class="ssub">${esc(s.sub)}</div>
        </div>
      </div>
      <div class="mini-legend"><span>← 전혀 그렇지 않다</span><span>매우 그렇다 →</span></div>
      ${qhtml}
      ${ohtml}
    </div>
    <div class="nav">
      <button class="btn-ghost btn" onclick="prev()">이전</button>
      <button class="btn btn-primary" onclick="next()">${state.idx===STEPS.length?'마지막 단계로':'다음'}</button>
    </div>`;
}

function renderTopics(){
  const items = TOPICS.map((t,i)=>{
    const sel = state.topics.has(i);
    return `<div class="topic ${sel?'sel':''}" onclick="toggleTopic(${i})">
      <div class="chk">${sel?'✓':''}</div>${esc(t)}</div>`;
  }).join('');
  screen.innerHTML = `
    <div class="card">
      <div class="step-head">
        <div class="step-badge">✓</div>
        <div>
          <h2>배우고 싶은 주제</h2>
          <div class="ssub">가족팀십에서 배우고 싶은 주제를 모두 골라주세요.</div>
        </div>
      </div>
      ${items}
    </div>
    <div class="nav">
      <button class="btn-ghost btn" onclick="prev()">이전</button>
      <button class="btn btn-primary" onclick="next()">진단 결과 보기</button>
    </div>`;
}

function renderResult(){
  // 척도 점수 계산
  const secScores = STEPS.map(s=>{
    const vals = s.scale.map(q=>state.answers[q.id]).filter(v=>v);
    const avg = vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    return { n:s.n, title:s.title, pct: Math.round(avg/5*100), avg };
  });
  const allVals = STEPS.flatMap(s=>s.scale.map(q=>state.answers[q.id])).filter(v=>v);
  const overall = allVals.length? Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length/5*100):0;

  let band, bmsg;
  if(overall>=80){ band="이미 단단한 가족팀 💞"; bmsg="서로를 팀으로 여기는 힘이 이미 깊이 자리잡고 있어요. 지금의 따뜻함을 어떻게 지속하고 나눌지 함께 이야기해보면 좋겠습니다."; }
  else if(overall>=60){ band="따뜻하게 성장 중인 팀 🌿"; bmsg="좋은 기반 위에서 한 걸음씩 단단해지는 중이에요. 조금만 더 의식적으로 연습하면 훨씬 견고한 가족팀이 될 수 있습니다."; }
  else if(overall>=40){ band="팀으로 발돋움하는 단계 🌱"; bmsg="가능성은 충분합니다. 대화 방식·역할 나눔·회복 방법을 함께 배우면 분명히 더 따뜻한 팀이 될 수 있어요."; }
  else { band="이제 팀십을 시작하는 단계 🤍"; bmsg="지금 솔직하게 마주한 것만으로도 큰 시작이에요. 작은 약속 하나부터 함께 만들어가면 됩니다. 혼자가 아니에요."; }

  const sorted = [...secScores].filter(s=>s.avg>0).sort((a,b)=>b.pct-a.pct);
  const strengths = sorted.slice(0,2);
  const growth = sorted.slice(-2).reverse();

  const secHtml = secScores.map(s=>`
    <div class="sec-row">
      <div class="top"><span>STEP ${s.n}. ${esc(s.title)}</span><span>${s.pct}%</span></div>
      <div class="sec-track"><div class="sec-fill" style="width:${s.pct}%"></div></div>
    </div>`).join('');

  const topicPills = [...state.topics].map(i=>`<span class="pill">${esc(TOPICS[i])}</span>`).join('') || '<span style="color:var(--muted);font-size:13px;">선택한 주제가 없습니다.</span>';

  const openMap = {};
  STEPS.forEach(s=>s.open.forEach(o=>openMap[o.id]=o.text));
  const openHtml = Object.keys(openMap).map(id=>{
    const a = (state.opens[id]||'').trim();
    if(!a) return '';
    return `<div class="open-review"><div class="oq">${esc(openMap[id])}</div><div class="oa">${esc(a)}</div></div>`;
  }).join('') || '<div style="color:var(--muted);font-size:13px;margin-top:8px;">작성한 서술형 답변이 없습니다.</div>';

  screen.innerHTML = `
    <div class="card res-hero">
      <div class="res-band">${band}</div>
      <div class="res-score">${overall}<small>%</small></div>
      <div class="res-msg">${bmsg}</div>
      <div id="saveStatus" style="margin-top:14px;font-size:13px;font-weight:700;color:var(--muted);">응답을 저장하는 중…</div>
    </div>

    <div class="card">
      <div class="res-sub" style="margin-top:0;">📊 단계별 진단 점수</div>
      ${secHtml}
    </div>

    <div class="card">
      <div class="res-sub" style="margin-top:0;">💪 우리 가족의 강점</div>
      <div class="pill-box">${strengths.map(s=>`<span class="pill good">STEP ${s.n}. ${esc(s.title)} (${s.pct}%)</span>`).join('')||'-'}</div>
      <div class="res-sub">🌱 함께 키워가면 좋을 영역</div>
      <div class="pill-box">${growth.map(s=>`<span class="pill">STEP ${s.n}. ${esc(s.title)} (${s.pct}%)</span>`).join('')||'-'}</div>
    </div>

    <div class="card">
      <div class="res-sub" style="margin-top:0;">✓ 배우고 싶은 주제</div>
      <div class="pill-box">${topicPills}</div>
    </div>

    <div class="card">
      <div class="res-sub" style="margin-top:0;">✍️ 나의 마음 기록</div>
      ${openHtml}
    </div>

    <div class="closing">
      가족은 서로를 이해하고 힘을 합쳐 각자의 성장을 돕는 팀입니다.<br>
      성장하는 가족팀은 <b style="color:var(--rose-deep)">함께 배우고 실천하는 것</b>에서 시작됩니다.
    </div>

    <div class="nav no-print">
      <button class="btn-ghost btn" onclick="copyResult(${overall})">결과 복사</button>
      <button class="btn btn-primary" onclick="window.print()">결과 저장 · 인쇄</button>
    </div>
    <div class="nav no-print" style="margin-top:10px;">
      <button class="btn-ghost btn" style="flex:1;" onclick="restart()">처음부터 다시하기</button>
    </div>`;

  const payload = {
    name: state.name||'', overall,
    steps: secScores.map(s=>s.pct),
    topics: [...state.topics].map(i=>TOPICS[i]),
    opens: state.opens
  };
  submitResult(payload);
}

function submitResult(payload){
  const st=document.getElementById('saveStatus');
  if(state.submitted){ if(st){st.textContent='응답이 저장되었습니다 ✓';st.style.color='var(--good)';} return; }
  if(!SCRIPT_URL || SCRIPT_URL.indexOf('http')!==0){
    if(st){st.textContent='(저장 서버 미설정 — 결과는 화면에서만 확인됩니다)';}
    return;
  }
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(()=>{ state.submitted=true; if(st){st.textContent='응답이 저장되었습니다 ✓';st.style.color='var(--good)';} })
    .catch(()=>{ if(st){st.textContent='저장 중 오류가 발생했어요. 인터넷 연결을 확인해주세요.';st.style.color='#c0392b';} });
}

/* ===== 인터랙션 ===== */
function pick(id,v){ state.answers[id]=v; render(); }
function setOpen(id,v){ state.opens[id]=v; }
function toggleTopic(i){ state.topics.has(i)?state.topics.delete(i):state.topics.add(i); render(); }

function next(){
  // 척도 문항 응답 확인 (서술형은 선택)
  if(state.idx>=1 && state.idx<=STEPS.length){
    const s = STEPS[state.idx-1];
    const unanswered = s.scale.filter(q=>!state.answers[q.id]);
    if(unanswered.length){
      toast(`척도 문항에 모두 응답해주세요 (${unanswered.length}개 남음)`);
      return;
    }
  }
  state.idx++; render();
}
function prev(){ if(state.idx>0){ state.idx--; render(); } }
function restart(){ state.idx=0; state.answers={}; state.opens={}; state.topics=new Set(); render(); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2200);
}

function copyResult(overall){
  let txt = `[우리 가족도 팀일까? — 가족 팀십 인식 진단 결과]\n전체 팀십 점수: ${overall}%\n\n`;
  STEPS.forEach(s=>{
    const vals=s.scale.map(q=>state.answers[q.id]).filter(v=>v);
    const pct = vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length/5*100):0;
    txt += `STEP ${s.n}. ${s.title}: ${pct}%\n`;
  });
  txt += `\n[배우고 싶은 주제]\n`;
  txt += ([...state.topics].map(i=>'· '+TOPICS[i]).join('\n') || '없음') + '\n';
  txt += `\n[서술형 답변]\n`;
  STEPS.forEach(s=>s.open.forEach(o=>{
    const a=(state.opens[o.id]||'').trim();
    if(a) txt+=`Q. ${o.text}\nA. ${a}\n\n`;
  }));
  navigator.clipboard.writeText(txt).then(()=>toast('결과가 복사되었어요 📋'),()=>toast('복사에 실패했어요'));
}

render();
</script>
</body>
</html>
